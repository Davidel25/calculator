<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון מס 2026 - דוד אליהו</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --bg: #f1f5f9; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; flex-direction: column; align-items: center; }
        .card { background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 480px; box-sizing: border-box; }
        h2 { color: #1e293b; text-align: center; margin-bottom: 20px; }
        .section-title { font-weight: bold; margin-top: 20px; padding-bottom: 5px; border-bottom: 2px solid #e2e8f0; color: var(--primary); }
        label { display: block; margin-top: 12px; font-weight: 600; color: #475569; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: white; }
        .quiz-option { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 10px; border-radius: 8px; margin-top: 8px; border: 1px solid #e2e8f0; }
        .quiz-option input { width: auto; margin: 0; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; margin-top: 24px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; display: none; }
        .res-box { padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: center; background: white; }
        .res-title { font-size: 0.8rem; color: #64748b; }
        .res-val { font-weight: bold; font-size: 1.1rem; color: #1e293b; }
        .savings-card { grid-column: span 2; background: #f0fdf4; border: 1px solid #10b981; padding: 15px; border-radius: 12px; text-align: center; }
        .highlight-val { color: var(--success); font-size: 1.4rem; font-weight: 800; }
        footer { margin: 25px 0; color: #94a3b8; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>מחשבון מס 2026 משודרג</h2>
    
    <label>שכר ברוטו חודשי:</label>
    <input type="number" id="gross" value="20000">

    <label>יישוב מזכה (הטבת מס):</label>
    <select id="location">
        <option value="0,0">ללא הטבת יישוב (מרכז)</option>
        <option value="0.07,162000">אשקלון (7%)</option>
        <option value="0.10,162000">יישובי עוטף/ספר (20%)</option>
        <option value="0.12,204000">נהריה/עכו (12%)</option>
    </select>

    <div class="section-title">אשף נקודות זיכוי</div>
    
    <div class="quiz-option">
        <span>אני אישה</span>
        <input type="checkbox" id="isWoman" onchange="updatePoints()">
    </div>

    <label>כמה ילדים מתחת לגיל 6?</label>
    <input type="number" id="kidsUnder6" value="0" min="0" onchange="updatePoints()">

    <label>כמה ילדים בגיל 6 עד 18?</label>
    <input type="number" id="kidsOver6" value="0" min="0" onchange="updatePoints()">

    <div class="quiz-option">
        <span>הורה יחיד (משפחה חד הורית)</span>
        <input type="checkbox" id="singleParent" onchange="updatePoints()">
    </div>

    <label>חייל/ת משוחרר/ת? (בשלוש השנים האחרונות)</label>
    <select id="army" onchange="updatePoints()">
        <option value="0">לא</option>
        <option value="2">שירות קרבי/מלא (2 נק')</option>
        <option value="1">שירות חלקי (1 נק')</option>
    </select>

    <label>סך נקודות זיכוי (חושב אוטומטית):</label>
    <input type="number" id="points" step="0.25" value="2.25">

    <button onclick="calculateAll()">חשב נטו והשוואה</button>

    <div id="resultGrid" class="result-grid">
        <div class="res-box">
            <div class="res-title">נטו ב-2025</div>
            <div id="net2025" class="res-val"></div>
        </div>
        <div class="res-box">
            <div class="res-title">נטו ב-2026</div>
            <div id="net2026" class="res-val"></div>
        </div>
        <div class="savings-card">
            <div class="res-title">החיסכון הכולל שלך לחודש:</div>
            <div id="totalDiff" class="highlight-val"></div>
        </div>
    </div>
</div>

<footer>נוצר על ידי דוד אליהו</footer>

<script>
function updatePoints() {
    let p = 2.25; // בסיס תושב
    if (document.getElementById('isWoman').checked) p += 0.5;
    
    const kidsU6 = parseInt(document.getElementById('kidsUnder6').value) || 0;
    const kidsO6 = parseInt(document.getElementById('kidsOver6').value) || 0;
    
    p += (kidsU6 * 2); // 2 נקודות לכל ילד מתחת ל-6
    p += (kidsO6 * 1); // 1 נקודה לכל ילד מעל 6 (מענק הורים)
    
    if (document.getElementById('singleParent').checked) p += 1;
    
    p += parseFloat(document.getElementById('army').value);
    
    document.getElementById('points').value = p;
}

function calcTax(gross, brackets, points, locationRate, locationCeiling) {
    let tax = 0;
    let prev = 0;
    for (let b of brackets) {
        if (gross > prev) {
            tax += (Math.min(gross, b.upTo) - prev) * b.rate;
            prev = b.upTo;
        }
    }
    tax = Math.max(0, tax - (points * 242));
    const monthlyCeiling = locationCeiling / 12;
    const locationBenefit = Math.min(gross, monthlyCeiling) * locationRate;
    return Math.max(0, tax - locationBenefit);
}

function calculateAll() {
    const gross = parseFloat(document.getElementById('gross').value);
    const points = parseFloat(document.getElementById('points').value);
    const [locRate, locCeiling] = document.getElementById('location').value.split(',').map(Number);

    const brackets2025 = [
        { upTo: 7010, rate: 0.10 }, { upTo: 10060, rate: 0.14 },
        { upTo: 16150, rate: 0.20 }, { upTo: 22440, rate: 0.31 },
        { upTo: 46690, rate: 0.35 }, { upTo: 60130, rate: 0.47 },
        { upTo: Infinity, rate: 0.50 }
    ];

    const brackets2026 = [
        { upTo: 7010, rate: 0.10 }, { upTo: 10060, rate: 0.14 },
        { upTo: 19000, rate: 0.20 }, { upTo: 25100, rate: 0.31 },
        { upTo: 46690, rate: 0.35 }, { upTo: 60130, rate: 0.47 },
        { upTo: Infinity, rate: 0.50 }
    ];

    const net2025 = gross - calcTax(gross, brackets2025, points, 0, 0);
    const net2026 = gross - calcTax(gross, brackets2026, points, locRate, locCeiling);

    document.getElementById('net2025').innerText = '₪' + Math.round(net2025).toLocaleString();
    document.getElementById('net2026').innerText = '₪' + Math.round(net2026).toLocaleString();
    document.getElementById('totalDiff').innerText = '₪' + Math.round(net2026 - net2025).toLocaleString();
    document.getElementById('resultGrid').style.display = 'grid';
}
</script>

</body>
</html>
